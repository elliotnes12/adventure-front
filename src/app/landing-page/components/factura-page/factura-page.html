                <label id="factura__logo_input" class="factura__logo_dragable-area">
                    <input class="factura__logo_input" id="factura__logo_input_file" type="file" accept="image/*">
                    <p>Drag and drop your logo here</p>
                </label>

            </div>
            <div class="factura__body">
                <div class="factura__body_left">

                    <input type="text" class="editable-input editable__header" placeholder="Your Company*">

                    <div class="factura__body_left_names">
                        <input type="text" class="editable-input" placeholder="First Name*">
                        <input type="text" class="editable-input" placeholder="Last Name*">
                    </div>

                    <input type="text" class="editable-input" placeholder="Company Website*">
                    <input type="text" class="editable-input" placeholder="Company Address*">
                    <input type="text" class="editable-input" placeholder="City,State ZIP*">
                    <input type="text" class="editable-input" placeholder="Country*">
                    <input type="text" class="editable-input" placeholder="Phone No*">
                    <input type="text" class="editable-input" placeholder="Email Address*">
                </div>


                <!--Datos del cliente-->

                <span class="factura__body_divider">
                    <div class="factura__body_left  factura__body_left--client">
                        <input type="text" class="editable-input editable__header" placeholder="Client's Company*">

                        <div class="factura__body_left_names">
                            <input type="text" class="editable-input" placeholder="First Name*">
                            <input type="text" class="editable-input" placeholder="Last Name*">
                        </div>

                        <input type="text" class="editable-input" placeholder="Client's Address*">
                        <input type="text" class="editable-input" placeholder="City,State ZIP*">
                        <input type="text" class="editable-input" placeholder="Country*">
                        <input type="text" class="editable-input" placeholder="Client's Address*">
                    </div>

                    <div class="factura__body_right">

                        <input type="text" class="editable-input text-right" placeholder="Invoice No* ###">
                        <input type="date" class="editable-input text-right" placeholder="Invoice Date*"
                            [value]="today">
                        <input type="date" class="editable-input text-right" placeholder="Due Date*" [value]="today">

                    </div>

                </span>


                <!--Agregar Productos -->

                <table class="factura__table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Description</th>
                            <th>Quantity</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        @if(products().length > 0){
                        @for(product of products();track product;let idx = $index){
                        <tr>
                            <td> <input type="text" [value]="product.id || ''" class="editable-input" placeholder="00"
                                    (blur)="updateElement(idx, 'id', $event.target.value)"></td>
                            <td><input type="text" class="editable-input" placeholder="Item Description*"
                                    [value]="product.description || ''"
                                    (blur)="updateElement(idx, 'description', $event.target.value)"></td>
                            <td><input type="number" class="editable-input" placeholder="Quantity*" min="1"
                                    [value]="product.quantity || 0"
                                    (blur)="updateElement(idx, 'quantity', $event.target.value)"></td>
                            <td class="factura__remove_product_box">
                                <input type="number" class="editable-input" placeholder="Unit Price*" min="0"
                                    step="0.01" [value]="product.price || 0"
                                    (blur)="updateElement(idx, 'price', $event.target.value)">
                                <a class="factura__remove_product_button" (click)="removeProduct(idx)">
                                    <img src="https://www.hubspot.com/hubfs/tools/invoice%20generator/deleteSvg.svg"
                                        alt="remove" />
                                </a>
                            </td>
                        </tr>
                        }
                        }

                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4" class="factura__add_product">
                                <a (click)="addProduct()" class="factura__add_product_button">Add Product</a>
                            </td>
                        </tr>
                    </tfoot>

                </table>

                <div>

                </div>

                <div class="factura_footer">

                </div>
            </div>
            <div class="factura__footer">
              <span class="factura__footer_divider">
                    <div class="factura__footer_left p-4">
                        <p>Notes:</p>
                        <textarea class="editable-area  flex-2"  placeholder="Nuevas notas"></textarea>    
                    </div>

                    <div class="factura__footer_right">
                        <div>
                          Subtotal<input type="text" class="editable-input text-right" placeholder="Subtotal" [value]="subtotal() | currency:'USD':true">
                        </div>
                        <div>
                          Tax:<input type="text" class="editable-input text-right" placeholder="Tax (10%)" [value]="tax() | currency:'USD':true">
                        </div>
                        <div>
                          Discount:<input type="text" class="editable-input text-right" placeholder="Discount" [value]="discount() | currency:'USD':true">
                        </div>
                       
                        <div class="factura__footer_total">
                          Total<input type="text" class="editable-input text-right" placeholder="Total" [value]="total() | currency:'USD':true">
                        </div>
                    </div>  
              </span>
            </div>
        </div>
    </form>
